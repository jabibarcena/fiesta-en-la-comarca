<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fiesta de cumpleaños</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Reset y base */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
  font-family: 'Poppins', Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  color: #f5f5f5;
  padding: 20px;
  overflow-x: hidden;
}

/* Caja principal */
.box {
  background: #1c1c1c;
  border-radius: 20px;
  padding: 50px 35px;
  max-width: 600px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 0 5px rgba(255,255,255,0.05);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.box:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.07);
}

/* Títulos */
h1 {
  font-size: 2.4em;
  margin-bottom: 20px;
  letter-spacing: 1px;
  color: #ffdd59;
  text-shadow: 0 0 10px #ffdd59, 0 0 20px #ff6f61;
  transition: text-shadow 0.3s ease;
}

/* Mensajes */
p {
  font-size: 1.2em;
  line-height: 1.5em;
  margin-bottom: 30px;
  color: #ddd;
}

/* Botón principal */
button {
  background: linear-gradient(135deg, #ff6f61, #ffdd59);
  border: none;
  border-radius: 12px;
  padding: 18px 40px;
  font-size: 1.3em;
  font-weight: 600;
  color: #1c1c1c;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(255,111,97,0.5), 0 6px 15px rgba(255,221,89,0.5);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
}

button:hover {
  transform: scale(1.05) translateY(-2px);
  box-shadow: 0 10px 25px rgba(255,111,97,0.6), 0 10px 25px rgba(255,221,89,0.6);
  background: linear-gradient(135deg, #ff8f7a, #ffe88a);
}

button:disabled {
  background: #555;
  color: #ccc;
  cursor: not-allowed;
  box-shadow: none;
}

/* Responsive */
@media(max-width: 500px){
  h1 { font-size: 1.8em; }
  p { font-size: 1em; }
  button { width: 100%; font-size: 1.1em; padding: 15px; }
}

/* Pantalla troll con animación sutil */
#pantallaTrolleo {
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<div class="box" id="pantallaBienvenida">
  <h1>🎉 Fiesta de cumpleaños de Piña, Llare y Barce 🎉</h1>
  <p>Apúntate al evento del año… si tu vida emocional lo permite 😎🍹</p>
  <button id="btnComprobar">QUIERO IR</button>
</div>

<div class="box" id="pantallaTrolleo" style="display:none;">
  <h1>Aforo completo</h1>
  <p id="mensaje">Comprobando tu valor como ser humano…</p>
</div>

<script>
const btnComprobar = document.getElementById("btnComprobar");
const pantallaBienvenida = document.getElementById("pantallaBienvenida");
const pantallaTrolleo = document.getElementById("pantallaTrolleo");
const mensaje = document.getElementById("mensaje");

btnComprobar.addEventListener("click", () => {
  pantallaBienvenida.style.display = "none";
  pantallaTrolleo.style.display = "block";

  const mensajes = [
    "Aforo completo. Y no vas a entrar porque eres una mierda",
    "Oops… todos los lugares están ocupados por gente más divertida que tú",
    "El cupo está lleno y, sinceramente, nadie extrañaría que no vinieras",
    "Estabas a tiempo… pero ya se acabó tu oportunidad, fracaso total",
    "Tu presencia no estaba en la lista… y eso es lo mejor que podía pasar"
  ];

  mensaje.innerText = mensajes[Math.floor(Math.random() * mensajes.length)];
});
</script>

</body>
</html>
