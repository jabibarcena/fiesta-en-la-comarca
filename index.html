<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fiesta de cumpleaños</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  background: #111;
  color: #eee;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  padding: 20px;
}

.box {
  background: #1e1e1e;
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

h1 {
  font-size: 2em;
  margin-bottom: 20px;
}

p {
  font-size: 1.2em;
  margin-bottom: 20px;
}

button {
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 1.2em;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #e53935;
  color: white;
  transition: transform 0.2s, background 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #c62828;
}

button:disabled {
  background: #555;
  cursor: not-allowed;
}

@media (max-width: 500px) {
  h1 { font-size: 1.5em; }
  p { font-size: 1em; }
  button { font-size: 1em; padding: 12px 20px; width: 100%; }
}
</style>
</head>
<body>

<div class="box" id="pantallaBienvenida">
  <h1>🎉 Fiesta de cumpleaños de Piña, Llare y Barce 🎉</h1>
  <p>Apúntate al evento del año… si tu vida emocional lo permite.</p>
  <button id="btnComprobar">QUIERO IR</button>
</div>

<div class="box" id="pantallaTrolleo" style="display:none;">
  <h1>Aforo completo 💀</h1>
  <p id="mensaje">Comprobando disponibilidad emocional...</p>
</div>

<script>
const btnComprobar = document.getElementById("btnComprobar");
const pantallaBienvenida = document.getElementById("pantallaBienvenida");
const pantallaTrolleo = document.getElementById("pantallaTrolleo");
const mensaje = document.getElementById("mensaje");

btnComprobar.addEventListener("click", () => {
  // Oculta bienvenida y muestra trolleo
  pantallaBienvenida.style.display = "none";
  pantallaTrolleo.style.display = "block";

  // Mensajes de humor negro aleatorios
  const mensajes = [
    "Aforo completo. Y no vas a entrar porque eres una mierda.",
    "Oops… todos los lugares están ocupados por gente más divertida que tú.",
    "Lo sentimos, tu combinación de cara y carisma no cumple requisitos.",
    "El cupo está lleno y, sinceramente, nadie extrañaría que no vinieras.",
    "Estabas a tiempo… pero ya se acabó tu oportunidad, fracasado.",
    "Hoy no es tu día… ni tu vida."
  ];

  // Elegir mensaje aleatorio
  mensaje.innerText = mensajes[Math.floor(Math.random() * mensajes.length)];
});
</script>

</body>
</html>
